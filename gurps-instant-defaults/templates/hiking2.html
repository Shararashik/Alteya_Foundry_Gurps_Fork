<div class="callheader">Hiking Calculator</div>

<div class="colpai">
  <div class="colunah">Terrain</div>
  <div class="colunah">Weather</div>
</div>

<div class="colpai">
  <div class="coluna1">
    <p id="coluna"><input type="radio" name="terrain" value="0.2"> Very Bad</p>
    <p id="coluna"><input type="radio" name="terrain" value="0.5"> Bad</p>
    <p id="coluna"><input type="radio" name="terrain" value="1"> Average</p>
    <p id="coluna"><input type="radio" name="terrain" value="1.25"> Good</p>
  </div>
  <div class="coluna1">
    <p id="coluna"><input type="radio" name="weather" value="6"> Normal</p>
    <p id="coluna"><input type="radio" name="weather" value="3"> Rain</p>
    <p id="coluna"><input type="radio" name="weather" value="4"> Ankle-deep Snow</p>
    <p id="coluna"><input type="radio" name="weather" value="5"> Heavy Snow</p>
  </div>
</div>

<div style="margin-top: 10px;">
  <label><b>Walking Hours:</b></label>
  <input id="hours" type="text" placeholder="e.g. 4">
</div>

<div id="mostra">
  <b style="font-size: 16px;">Instructions</b><br>
  Select tokens, pick terrain and weather, enter walking hours and press "Result".
</div>

<div class="butpai">
  <button class="button-28" id="roll">Roll</button>
  <button class="button-28" id="result">Result</button>
</div>

<script>
  const mostra = document.getElementById("mostra");

  document.getElementById("roll").addEventListener("click", () => {
    GURPS.executeOTF('/roll ["Hiking" /r [S:Hiking | HT-5]]');
  });

  document.getElementById("result").addEventListener("click", () => {
    const tokens = canvas.tokens.controlled;
    if (!tokens.length) return ui.notifications.warn("Select at least one token.");

    const hours = Number(document.getElementById("hours").value || 0);
    if (!hours) return ui.notifications.warn("Enter walking hours.");

    const moves = tokens.map(t => t.actor.system.basicmove.value);
    const minMove = Math.min(...moves);

    const terrainMod = Number(document.querySelector('input[name="terrain"]:checked')?.value || 1);
    const weatherVal = Number(document.querySelector('input[name="weather"]:checked')?.value || 6);

    let weatherMod = 1;
    if (weatherVal === 3 || weatherVal === 4) weatherMod = 0.5;
    if (weatherVal === 5) weatherMod = 0.25;

    const base = Math.floor(minMove * hours * 0.8);
    const success = Math.floor(base * 1.2);

    const final = Math.floor(base * terrainMod * weatherMod);
    const finalSuccess = Math.floor(success * terrainMod * weatherMod);

    const token = tokens[0];
    const actor = game.actors.get(token.actor.id);
    const rollData = GURPS.lastTargetedRolls?.[actor.id];
    const margin = rollData?.margin ?? -1;

    if (margin < 0) {
      mostra.innerHTML = `<p id="diferente">FAILED</p> Walked <b>${final}</b> miles in <b>${hours}</b> hours.`;
    } else {
      mostra.innerHTML = `<p id="diferente">SUCCESS</p> Walked <b>${finalSuccess}</b> miles in <b>${hours}</b> hours.`;
    }
  });
</script>
